name: Deploy to Hugging Face Space

on:
  push:
    branches: [main]
    paths:
      - "mace-api/**"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push mace-api to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

          # Clone the HF Space repo
          git clone https://Jamessfks:${HF_TOKEN}@huggingface.co/spaces/Jamessfks/mace-api /tmp/hf-space

          # Copy API files to HF Space root
          cp mace-api/Dockerfile /tmp/hf-space/
          cp mace-api/README.md /tmp/hf-space/
          cp mace-api/calculate.py /tmp/hf-space/
          cp mace-api/calculate_local.py /tmp/hf-space/
          cp mace-api/main.py /tmp/hf-space/
          cp mace-api/requirements.txt /tmp/hf-space/

          # Commit and push
          cd /tmp/hf-space
          git add -A
          git diff --staged --quiet && echo "No changes to deploy" && exit 0
          git commit -m "Auto-deploy from GitHub @ $(git -C $GITHUB_WORKSPACE rev-parse --short HEAD)"
          git push
